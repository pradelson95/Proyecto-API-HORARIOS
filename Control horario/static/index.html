<!DOCTYPE html>
<html lang="en"> <!-- Define el idioma del documento -->
     
<head>
    <meta charset="UTF-8"> <!-- Permite usar caracteres especiales -->
    <title>Employee Time Tracker</title> <!-- Título que aparece en la pestaña -->
    
    <!-- Conectamos el archivo CSS externo -->
    <link rel="stylesheet" href="/static/styles.css">

</head>

<body>
    <!-- Contenedor principal para centrar y dar estilo -->
    <div class="container">
        
        <h1>Employee Time Registration</h1>

        <!-- Formulario principal -->
        <form id="employeeForm">
            
            <!-- Grupo de campo: Nombre -->
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <!-- input tipo texto -->
                <!-- required obliga al usuario a completarlo -->
                <input type="text" id="full_name" required>
            </div>

            <!-- Grupo de campo: Hora entrada -->
            <div class="form-group">
                <label for="check_in">Check In</label>
                <!-- type="time" genera selector de hora automático -->
                <input type="time" id="check_in" required>
            </div>

            <!-- Grupo de campo: Hora salida -->
            <div class="form-group">
                <label for="check_out">Check Out</label>
                <input type="time" id="check_out" required>
            </div>

            <!-- Grupo de campo: Hora salida -->
            <div class="form-group">
                <label for="id_identification">Identification Number</label>
                <input type="number" id="id_identification" required>
            </div>

            <!-- Botón para enviar formulario -->
            <button type="submit">Submit</button>
        </form>

        <!-- Aquí se mostrará el mensaje de éxito o error -->
        <p id="message"></p>
    </div>

    <!-- Conectamos el archivo JS al final del body -->
    <!-- Se coloca abajo para que el DOM ya esté cargado -->
    <script src="/static/script.js"></script>

</body>
</html>
